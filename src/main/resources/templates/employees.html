<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employees - EMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Employee Management</h2>

    <!-- Search + Add -->
    <div class="d-flex justify-content-between my-3">

        <input type="text" id="searchInput" class="form-control w-50"
               placeholder="Search by name or department..." onkeyup="searchEmployee()">

        <a href="/add-employee.html" class="btn btn-primary">+ Add Employee</a>
    </div>

    <!-- Table -->
    <div class="card">

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody id="employeeTable">
            <!-- Data will load here -->
            </tbody>
        </table>

        <!-- Pagination -->
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>

    </div>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}

let employees = [];
let currentPage = 1;
let pageSize = 5;

// Load employees
async function loadEmployees() {
    const res = await fetch("/api/employees", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    employees = await res.json();
    renderTable();
    renderPagination();
}

// Render table
function renderTable() {

    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;

    let filtered = employees.slice(start, end);

    let rows = "";

    filtered.forEach(emp => {
        rows += `
            <tr>
                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.email}</td>
                <td>${emp.department}</td>
                <td>${emp.designation || ''}</td>
                <td>${emp.salary}</td>

                <td>
                    <button class="btn btn-sm btn-warning" onclick="editEmployee(${emp.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${emp.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    document.getElementById("employeeTable").innerHTML = rows;
}

// Pagination
function renderPagination() {
    let pageCount = Math.ceil(employees.length / pageSize);
    let pagination = "";

    for (let i = 1; i <= pageCount; i++) {
        pagination += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="goToPage(${i})">${i}</a>
            </li>
        `;
    }

    document.getElementById("pagination").innerHTML = pagination;
}

function goToPage(page) {
    currentPage = page;
    renderTable();
    renderPagination();
}

// Search
function searchEmployee() {
    let keyword = document.getElementById("searchInput").value.toLowerCase();

    let filtered = employees.filter(emp =>
        emp.name.toLowerCase().includes(keyword) ||
        emp.department.toLowerCase().includes(keyword)
    );

    let rows = "";

    filtered.forEach(emp => {
        rows += `
            <tr>
                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.email}</td>
                <td>${emp.department}</td>
                <td>${emp.designation || ''}</td>
                <td>${emp.salary}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editEmployee(${emp.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${emp.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    document.getElementById("employeeTable").innerHTML = rows;
}

// Delete employee
async function deleteEmployee(id) {
    if (!confirm("Are you sure?")) return;

    await fetch(`/api/employees/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadEmployees();
}

// Edit (redirect)
function editEmployee(id) {
    window.location.href = `/edit-employee.html?id=${id}`;
}

// Init
loadEmployees();

</script>

</body>
</html>
