<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - EMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding-top: 20px;
            position: fixed;
            width: 220px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            margin-left: 230px;
            padding: 20px;
        }

        .card-box {
            border-radius: 10px;
            color: white;
            padding: 20px;
        }

        .bg-blue { background: #007bff; }
        .bg-green { background: #28a745; }
        .bg-orange { background: #fd7e14; }
        .bg-red { background: #dc3545; }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center">EMS Admin</h4>
    <a href="#">Dashboard</a>
    <a href="/employees.html">Employees</a>
    <a href="/add-employee.html">Add Employee</a>
    <a href="#" onclick="logout()">Logout</a>
</div>

<!-- Main Content -->
<div class="content">

    <h2>Dashboard</h2>
    <p>Welcome to Employee Management System</p>

    <!-- Cards -->
    <div class="row">

        <div class="col-md-3">
            <div class="card-box bg-blue">
                <h5>Total Employees</h5>
                <h2 id="totalEmployees">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-green">
                <h5>Active</h5>
                <h2>0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-orange">
                <h5>Departments</h5>
                <h2>0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg-red">
                <h5>New Joiners</h5>
                <h2>0</h2>
            </div>
        </div>

    </div>

</div>

<!-- JS -->
<script>
const token = localStorage.getItem("token");

// Redirect if not logged in
if (!token) {
    window.location.href = "/login.html";
}

// Fetch employees count
async function loadStats() {
    try {
        const res = await fetch("/api/employees", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (res.ok) {
            const data = await res.json();
            document.getElementById("totalEmployees").innerText = data.length;
        }
    } catch (error) {
        console.log(error);
    }
}

loadStats();

// Logout
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}
</script>

</body>
</html>
